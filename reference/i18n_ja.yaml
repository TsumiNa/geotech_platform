# =============================================================================
# i18n_ja.yaml  --  English <-> Japanese display terms for the screening tool
# -----------------------------------------------------------------------------
# Japanese terms use vocabulary common in the Japanese geotechnical engineering
# community (地盤工学 / 応用地質). These are DISPLAY labels for the coded values
# in the ontology and rules; the underlying codes (e.g. weak_sedimentary_rock)
# are unchanged so the database and logic stay language-neutral.
#
# Reviewers: please refine any term that does not match your in-house usage. The
# `note_ja` fields give short clarifying notes where a term is approximate.
# =============================================================================

meta:
  version: "0.1.0"
  status: "draft-first-version (review Japanese terms)"
  languages: ["en", "ja"]

# --- engineering ground types (geotech_ontology.yaml classes) ---------------
ground_types:
  young_unconsolidated_soil:
    en: "Young (Holocene) unconsolidated soil"
    ja: "完新世未固結土（軟弱土）"
    note_ja: "いわゆる軟弱地盤。沖積層中の有機質土・粘性土・緩い砂を含む。"
  artificial_fill_reclaimed_ground:
    en: "Artificial fill / reclaimed ground"
    ja: "人工地盤（盛土・埋立地）"
    note_ja: "盛土・埋立など人工的に形成された地盤。"
  alluvial_lowland_deposits:
    en: "Alluvial lowland deposits"
    ja: "沖積低地堆積物"
    note_ja: "完新統の河川・氾濫原・扇状地・谷底堆積物（砂礫～粘性土の互層）。"
  terrace_deposits:
    en: "River / marine terrace deposits"
    ja: "段丘堆積物（洪積層）"
    note_ja: "更新統の河成・海成段丘堆積物。一般に締まった砂礫・硬質粘土。"
  volcanic_ash_loam:
    en: "Volcanic ash soil / Kanto Loam / tephra"
    ja: "火山灰質土（関東ローム）"
    note_ja: "関東ローム・テフラ。高含水比・高間隙比で含水比に敏感。"
  pyroclastic_tuffaceous_ground:
    en: "Pyroclastic / tuffaceous ground"
    ja: "火砕物・凝灰質地盤"
    note_ja: "凝灰岩・火砕流堆積物等。固結度・強度のばらつきが大きい。"
  weak_sedimentary_rock:
    en: "Weak sedimentary rock (mudstone/siltstone/sandstone)"
    ja: "堆積軟岩（泥岩・砂岩・シルト岩等）"
    note_ja: "新第三系等の軟岩。泥岩はスレーキングに注意。"
  hard_crystalline_rock:
    en: "Hard crystalline / strong rock"
    ja: "硬岩（結晶質岩）"
    note_ja: "花崗岩等。表層風化帯・節理の影響に注意。"
  fault_fracture_zone:
    en: "Fault / fracture / shear zone"
    ja: "断層・破砕帯"
    note_ja: "断層・破砕帯。位置・幅は1/5万図では概略。"
  mixed_or_uncertain_geology:
    en: "Mixed / uncertain geology (needs review)"
    ja: "混在・不確定地質（要確認）"
    note_ja: "属性不足等で分類できない単位。手動レビューが必要。"

# --- material families ------------------------------------------------------
material_families:
  artificial_ground: {en: "Artificial ground", ja: "人工地盤"}
  soft_soil: {en: "Soft soil", ja: "軟弱土"}
  alluvial_soil: {en: "Alluvial soil", ja: "沖積土"}
  terrace_soil: {en: "Terrace soil", ja: "段丘堆積物（洪積土）"}
  volcanic_ash_soil: {en: "Volcanic ash soil", ja: "火山灰質土"}
  pyroclastic_ground: {en: "Pyroclastic ground", ja: "火砕物地盤"}
  weak_rock: {en: "Weak rock", ja: "軟岩"}
  hard_rock: {en: "Hard rock", ja: "硬岩"}
  fault_fracture: {en: "Fault / fracture zone", ja: "断層・破砕帯"}
  mixed_or_unknown: {en: "Mixed / unknown", ja: "混在・不明"}

# --- confidence -------------------------------------------------------------
confidence:
  high: {en: "high", ja: "高"}
  medium: {en: "medium", ja: "中"}
  low: {en: "low", ja: "低"}
  very_low: {en: "very low", ja: "非常に低い"}

# --- screening risk flags (engineering_risk_dictionary.yaml) ----------------
risk_flags:
  variable_fill: {en: "Variable artificial fill", ja: "盛土の不均質性"}
  unknown_fill_thickness: {en: "Unknown fill thickness", ja: "盛土層厚不明"}
  settlement_screening: {en: "Settlement screening relevant", ja: "沈下の検討（スクリーニング）"}
  soft_compressible_soil: {en: "Soft / compressible soil possible", ja: "軟弱・圧密性土の可能性"}
  organic_soil: {en: "Organic soil possible", ja: "有機質土（腐植土）の可能性"}
  liquefaction_screening: {en: "Liquefaction screening relevant", ja: "液状化の検討（スクリーニング）"}
  shallow_groundwater: {en: "Shallow groundwater likely", ja: "浅い地下水位の可能性"}
  interbedded_variability: {en: "Interbedded layer variability", ja: "互層による不均質性"}
  abrupt_layer_change: {en: "Abrupt layer changes", ja: "層相の急変"}
  cobbles_boulders_possible: {en: "Cobbles / boulders possible", ja: "玉石・転石の可能性"}
  perched_water_possible: {en: "Perched water possible", ja: "宙水の可能性"}
  moisture_sensitive: {en: "Moisture-sensitive soil", ja: "含水比に敏感な土"}
  high_void_ratio: {en: "High void ratio soil", ja: "高間隙比（鋭敏な構造）"}
  thickness_uncertainty: {en: "Thickness uncertainty", ja: "層厚の不確実性"}
  slope_surface_erosion: {en: "Slope surface stability / erosion", ja: "法面表層崩壊・侵食"}
  variable_strength: {en: "Variable strength", ja: "強度のばらつき"}
  weathering_degradation: {en: "Weathering / degradation", ja: "風化による劣化"}
  slaking: {en: "Slaking susceptibility", ja: "スレーキング（泥岩等の崩壊性）"}
  variable_rockhead: {en: "Variable rockhead depth", ja: "岩盤上面（風化深度）の不確実性"}
  bedding_controlled_slope_excavation: {en: "Bedding-controlled slope/excavation", ja: "層理に支配される斜面・掘削"}
  slope_excavation_risk: {en: "Slope / excavation risk", ja: "斜面・掘削の不安定性"}
  weathered_zone: {en: "Weathered zone near surface", ja: "表層風化帯"}
  corestones_possible: {en: "Corestones possible", ja: "コアストーン（核石）の可能性"}
  jointing_control: {en: "Jointing / discontinuity control", ja: "節理（不連続面）の影響"}
  high_uncertainty: {en: "High spatial uncertainty", ja: "空間的不確実性が大きい"}
  low_strength_zone: {en: "Low-strength zone", ja: "低強度帯"}
  groundwater_pathway: {en: "Groundwater pathway", ja: "地下水の通り道"}
  slope_tunnel_risk: {en: "Slope / tunnel risk", ja: "斜面・トンネルへの影響"}
  contamination_screening: {en: "Contamination screening relevant", ja: "土壌汚染の検討（スクリーニング）"}
  unclassified: {en: "Unclassified unit", ja: "未分類"}
  needs_manual_review: {en: "Needs manual review", ja: "要手動レビュー"}

# --- UI strings -------------------------------------------------------------
