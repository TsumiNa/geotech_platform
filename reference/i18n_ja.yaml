  language_label: {en: "Language", ja: "言語"}
  disclaimer:
    en: >
      Screening & investigation-planning tool only. Outputs are plausible
      ground-condition hypotheses, risk flags and recommended investigation —
      NOT bearing capacity, pile length, settlement, liquefaction safety factor,
      or slope-stability results. Always confirm with site investigation.
    ja: >
      本ツールは机上スクリーニング・調査計画立案のための補助ツールです。出力は想定される
      地盤条件の仮説・リスク要因・推奨調査であり、支持力・杭長・沈下量・液状化の安全率・
      斜面安定計算結果などの設計値ではありません。必ず現地調査で確認してください。
  pipeline_caption:
    en: "Pipeline: Raw GSJ 1:50,000 geology → normalized geology → geotech ontology/rules → unit cards → query-ready geotechnical database."
    ja: "処理の流れ：GSJ 5万分の1地質図 → 正規化地質 → 地盤工学オントロジー/ルール → ユニットカード → クエリ可能な地盤地質データベース"
